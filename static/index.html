<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Learn Hub — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      display: flex; align-items: stretch; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ede9fe 0%, #e0e7ff 50%, #ddd6fe 100%);
    }
    /* Left illustration panel */
  .login-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  position: relative;
  z-index: 1;
}
    .brand-badge { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo-circle {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 22px; font-weight: 900;
      box-shadow: 0 4px 16px rgba(79,70,229,0.35);
    }
    .brand-name { font-size: 20px; font-weight: 800; color: var(--slate); }
    .login-tagline {
      font-size: 30px; font-weight: 900; color: var(--slate);
      line-height: 1.25; text-align: center; margin-top: 24px; margin-bottom: 10px;
    }
    .login-tagline em { color: var(--indigo); font-style: normal; }
    .login-sub { font-size: 14px; color: var(--muted); text-align: center; font-family: 'Poppins', sans-serif; }

    /* Right form panel */
    .login-right {
      flex: 0 0 440px; display: flex; align-items: center;
      justify-content: center; padding: 40px 30px;
      position: relative; z-index: 1;
    }
    .login-card {
      width: 100%; padding: 40px 36px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(79,70,229,0.16);
    }
    .login-card h2 { font-size: 22px; font-weight: 900; color: var(--slate); margin-bottom: 6px; }
    .login-card > p { font-size: 13px; color: var(--muted); margin-bottom: 26px; font-family: 'Poppins', sans-serif; }

    /* Role tabs */
    .role-tabs {
      display: flex; gap: 10px; margin-bottom: 26px;
      background: var(--sky); border-radius: 14px; padding: 5px;
    }
    .role-tab {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.25s; color: var(--muted); background: transparent;
    }
    .role-tab.active {
      background: #fff; color: var(--indigo);
      box-shadow: 0 2px 12px rgba(79,70,229,0.15);
    }

    @media (max-width: 900px) {
      body { flex-direction: column; }
      .login-left  { padding: 40px 24px 20px; }
      .login-right { flex: none; width: 100%; padding: 0 24px 40px; }
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- LEFT — Illustration + branding -->
  <div class="login-left">
    <div class="brand-badge">
      <div class="logo-circle">SL</div>
      <span class="brand-name">Smart Learn Hub</span>
    </div>

    <!-- SVG Illustration -->
    <svg width="320" height="255" viewBox="0 0 320 255" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="40"  y="188" width="240" height="11" rx="5.5" fill="#c7d2fe"/>
      <rect x="72"  y="199" width="10"  height="38" rx="5"   fill="#a5b4fc"/>
      <rect x="238" y="199" width="10"  height="38" rx="5"   fill="#a5b4fc"/>
      <rect x="92"  y="112" width="136" height="88" rx="10"  fill="#312e81"/>
      <rect x="98"  y="118" width="124" height="76" rx="7"   fill="#4338ca"/>
      <rect x="108" y="130" width="76"  height="6"  rx="3"   fill="rgba(167,139,250,0.55)"/>
      <rect x="108" y="142" width="56"  height="4"  rx="2"   fill="rgba(167,139,250,0.38)"/>
      <rect x="108" y="152" width="68"  height="4"  rx="2"   fill="rgba(167,139,250,0.38)"/>
      <rect x="108" y="162" width="46"  height="4"  rx="2"   fill="rgba(167,139,250,0.26)"/>
      <rect x="152" y="200" width="16"  height="14" rx="2"   fill="#a5b4fc"/>
      <rect x="140" y="213" width="40"  height="6"  rx="3"   fill="#a5b4fc"/>
      <rect x="44"  y="166" width="50"  height="10" rx="3"   fill="#818cf8"/>
      <rect x="48"  y="156" width="44"  height="10" rx="3"   fill="#a78bfa"/>
      <rect x="52"  y="147" width="38"  height="10" rx="3"   fill="#c4b5fd"/>
      <ellipse cx="242" cy="158" rx="26" ry="33" fill="#fde68a"/>
      <ellipse cx="242" cy="180" rx="21" ry="17" fill="#6366f1"/>
      <circle cx="242" cy="127" r="21" fill="#fde68a"/>
      <ellipse cx="242" cy="111" rx="21" ry="11" fill="#1e1b4b"/>
      <ellipse cx="224" cy="120" rx="7.5" ry="13" fill="#1e1b4b"/>
      <circle cx="236" cy="126" r="2.2" fill="#1e1b4b"/>
      <circle cx="248" cy="126" r="2.2" fill="#1e1b4b"/>
      <path d="M236 133 Q242 139 248 133" stroke="#1e1b4b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M220 167 Q203 173 198 186" stroke="#fde68a" stroke-width="9" stroke-linecap="round" fill="none"/>
      <path d="M262 167 Q278 167 278 180" stroke="#fde68a" stroke-width="9" stroke-linecap="round" fill="none"/>
      <rect x="192" y="183" width="78" height="46" rx="6" fill="#312e81"/>
      <rect x="197" y="188" width="68" height="36" rx="4" fill="#4338ca"/>
      <rect x="186" y="228" width="90" height="5"  rx="2.5" fill="#312e81"/>
      <rect x="28"  y="78"  width="30" height="30" rx="8" fill="#ddd6fe" opacity="0.72" transform="rotate(-10 28 78)"/>
      <text x="34"  y="99"  font-size="16">📚</text>
      <rect x="266" y="58"  width="30" height="30" rx="8" fill="#e0e7ff" opacity="0.72" transform="rotate(8 266 58)"/>
      <text x="272" y="79"  font-size="16">🎓</text>
      <circle cx="58"  cy="48"  r="12" fill="#c7d2fe" opacity="0.58"/>
      <circle cx="280" cy="168" r="9"  fill="#ede9fe" opacity="0.52"/>
      <text x="151" y="45" font-size="12">⭐</text>
    </svg>

    <div class="login-tagline">Learn <em>Anywhere,</em><br/>Even Offline.</div>
    <div class="login-sub">Your school's digital classroom — no internet needed</div>
  </div>

  <!-- RIGHT — Login form -->
  <div class="login-right">
    <div class="login-card">
      <h2>Welcome Back 👋</h2>
      <p>Sign in to your Smart Learning account</p>

      <!-- Role toggle -->
      <div class="role-tabs">
        <button class="role-tab active" onclick="switchRole('student', this)">🎒 Student</button>
        <button class="role-tab"        onclick="switchRole('teacher', this)">📋 Teacher</button>
      </div>

      <!-- STUDENT FORM -->
      <div id="student-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="student-name" placeholder="Enter your full name"/>
        </div>
        <div class="form-group">
          <label>Class &amp; Division</label>
          <select id="student-class">
            <option value="">Select your class</option>
            <option>Class 8 </option>  
            <option>Class 9  </option>  
            <option>Class 10 </option> >
            <option>Class 11 – Science</option> 
            <option>Class 12 – Science</option> 
          </select>
        </div>
        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" id="student-roll" placeholder="e.g. 24"/>
        </div>
        <button class="btn-primary" onclick="loginStudent()">Continue to Learn →</button>
      </div>

      <!-- TEACHER FORM -->
      <div id="teacher-form" style="display:none;">
        <div class="form-group">
          <label>Staff ID</label>
          <input type="text" id="teacher-id" placeholder="Enter your staff ID"/>
        </div>
         <div class="form-group">
          <label>Class &amp; Division</label>
          <select id="student-class">
            <option value="">Select your class</option>
            <option>Class 8 </option>  
            <option>Class 9  </option>  
            <option>Class 10 </option> >
            <option>Class 11 – Science</option> 
            <option>Class 12 – Science</option> 
          </select>
        </div>
        <div class="form-group">
          <label>PIN / Password</label>
          <input type="password" id="teacher-pin" placeholder="Enter PIN"/>
        </div>
        <button class="btn-primary" onclick="loginTeacher()">Access Dashboard →</button>
        <div class="divider">Default PIN is 1234</div>
      </div>

    </div>
  </div>

  <script>
  /* Switch between Student and Teacher tabs */
  function switchRole(role, btn) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('student-form').style.display = role === 'student' ? 'block' : 'none';
    document.getElementById('teacher-form').style.display = role === 'teacher' ? 'block' : 'none';
  }

  /* Student login — calls Flask backend */
  async function loginStudent() {
    const name = document.getElementById('student-name').value.trim();
    const cls  = document.getElementById('student-class').value;
    const roll = document.getElementById('student-roll').value.trim();

    if (!name) { alert('Please enter your name.'); return; }
    if (!cls)  { alert('Please select your class.'); return; }
    if (!roll) { alert('Please enter your roll number.'); return; }

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'student', name: name, class_div: cls, roll: roll })
    });

    const data = await res.json();

    if (!data.success) { alert(data.message); return; }

    sessionStorage.setItem('sl_name', data.name);
    sessionStorage.setItem('sl_class', cls);
    sessionStorage.setItem('sl_roll', roll);
    sessionStorage.setItem('sl_role', 'student');

    window.location.href = 'student.html';
  }

  /* Teacher login — calls Flask backend */
  async function loginTeacher() {
    const staffId = document.getElementById('teacher-id').value.trim();
    const pin     = document.getElementById('teacher-pin').value.trim();

    if (!staffId) { alert('Please enter your Staff ID.'); return; }
    if (!pin)     { alert('Please enter your PIN.'); return; }

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'teacher', staff_id: staffId, password: pin })
    });

    const data = await res.json();

    if (!data.success) { alert(data.message); return; }

    sessionStorage.setItem('sl_role', 'teacher');
    sessionStorage.setItem('sl_name', data.name);

    window.location.href = 'teacher.html';
  }
</script>
</body>
</html>
